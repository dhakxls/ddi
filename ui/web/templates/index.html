<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDI Prediction MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        
        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #495057;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 1em;
        }
        
        .tab:hover {
            background: #e9ecef;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        
        .content {
            padding: 30px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #343a40;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .enzyme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .enzyme-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }
        
        .enzyme-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .results h2 {
            color: #343a40;
            margin-bottom: 20px;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        
        .result-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .risk-contraindicated {
            background: #dc3545;
            color: white;
        }
        
        .risk-major {
            background: #fd7e14;
            color: white;
        }
        
        .risk-moderate {
            background: #ffc107;
            color: #212529;
        }
        
        .risk-minor {
            background: #28a745;
            color: white;
        }
        
        .confidence-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        .confidence-high {
            background: #28a745;
            color: white;
        }
        
        .confidence-medium {
            background: #ffc107;
            color: #212529;
        }
        
        .confidence-low {
            background: #6c757d;
            color: white;
        }
        
        .list-group {
            list-style: none;
        }
        
        .list-group li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .list-group li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>DDI Prediction MVP</h1>
            <p>Drug-Drug Interaction Risk Assessment for Clinical Trials</p>
        </div>
        
        <div class="tabs">
            <button class="tab active">DDI Risk Ranking</button>
        </div>
        
        <div class="content">
            <!-- DDI Risk Tab -->
            <div id="ddi-tab" class="tab-content active">
                <h2>Drug A</h2>
                <div class="form-group">
                    <label for="ddi-drug-a-name">Drug A Name</label>
                    <input type="text" id="ddi-drug-a-name" placeholder="e.g., Warfarin">
                </div>
                
                <button class="btn btn-secondary" onclick="fetchDrugData('ddi-drug-a')">Fetch Drug A Data from APIs</button>
                
                <h3>Enzyme Data</h3>
                <div class="enzyme-grid" id="ddi-drug-a-enzymes">
                    <!-- Enzyme cards will be generated by JavaScript -->
                </div>
                
                <h2 style="margin-top: 30px;">Drug B</h2>
                <div class="form-group">
                    <label for="ddi-drug-b-name">Drug B Name</label>
                    <input type="text" id="ddi-drug-b-name" placeholder="e.g., Fluconazole">
                </div>
                
                <button class="btn btn-secondary" onclick="fetchDrugData('ddi-drug-b')">Fetch Drug B Data from APIs</button>
                
                <h3>Enzyme Data</h3>
                <div class="enzyme-grid" id="ddi-drug-b-enzymes">
                    <!-- Enzyme cards will be generated by JavaScript -->
                </div>
                
                <button class="btn btn-primary" onclick="predictDDI()">Predict DDI Risk</button>
                
                <div id="ddi-results"></div>
            </div>
        </div>
    </div>
    
    <script>
        const BASE_PATH = "{{ base_path }}";
        const withBasePath = (path) => {
            if (!BASE_PATH) {
                return path;
            }
            if (path.startsWith('/')) {
                return `${BASE_PATH}${path}`;
            }
            return `${BASE_PATH}/${path}`;
        };

        const enzymes = ["CYP1A2", "CYP2B6", "CYP2C8", "CYP2C9", "CYP2C19", "CYP2D6", "CYP2E1", "CYP3A4", "CYP3A5"];
        
        function getEnzymeData(prefix) {
            const data = {
                substrate_data: {},
                inhibition_data: {},
                induction_data: {}
            };
            
            enzymes.forEach(enzyme => {
                // Substrate data
                const isSubstrate = document.getElementById(`${prefix}-${enzyme}-substrate`).checked;
                const fm = isSubstrate ? parseFloat(document.getElementById(`${prefix}-${enzyme}-fm`).value) || 0 : null;
                
                data.substrate_data[enzyme] = {
                    is_substrate: isSubstrate,
                    fm: fm
                };
                
                // Inhibition data
                const isInhibitor = document.getElementById(`${prefix}-${enzyme}-inhibitor`).checked;
                const inhibitionType = isInhibitor ? document.getElementById(`${prefix}-${enzyme}-inhibition-type`).value : null;
                
                data.inhibition_data[enzyme] = {
                    is_inhibitor: isInhibitor,
                    inhibition_type: inhibitionType
                };
                
                // Induction data
                const isInducer = document.getElementById(`${prefix}-${enzyme}-inducer`).checked;
                const inductionType = isInducer ? document.getElementById(`${prefix}-${enzyme}-induction-type`).value : null;
                
                data.induction_data[enzyme] = {
                    is_inducer: isInducer,
                    induction_type: inductionType
                };
            });
            
            return data;
        }
        
        async function predictDDI() {
            const drugAName = document.getElementById('ddi-drug-a-name').value;
            const drugBName = document.getElementById('ddi-drug-b-name').value;
            
            if (!drugAName || !drugBName) {
                alert('Please enter both drug names');
                return;
            }
            
            const drugAData = {
                compound_name: drugAName,
                ...getEnzymeData('ddi-drug-a')
            };
            
            const drugBData = {
                compound_name: drugBName,
                ...getEnzymeData('ddi-drug-b')
            };
            
            const resultsDiv = document.getElementById('ddi-results');
            resultsDiv.innerHTML = '<div class="loading">Predicting...</div>';
            
            try {
                const response = await fetch(withBasePath('/api/predict/ddi'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        drug_a: drugAData,
                        drug_b: drugBData
                    })
                });
                
                const result = await response.json();
                displayDDIResults(result);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function fetchDrugData(prefix) {
            const drugNameInput = document.getElementById(`${prefix}-name`);
            const nameInput = drugNameInput ? drugNameInput.value : '';
            
            if (!nameInput) {
                alert('Please enter a drug name first');
                return;
            }
            
            // Insert results div after the fetch button
            const button = document.querySelector(`button[onclick="fetchDrugData('${prefix}')"]`);
            let resultsDiv = document.getElementById(`${prefix}-results`);
            if (!resultsDiv) {
                resultsDiv = document.createElement('div');
                resultsDiv.id = `${prefix}-results`;
                button.after(resultsDiv);
            }
            
            resultsDiv.innerHTML = '<div class="loading">Fetching data from APIs...</div>';
            
            try {
                const response = await fetch(withBasePath(`/api/fetch/drug/${encodeURIComponent(nameInput)}`));
                const data = await response.json();
                
                // Populate enzyme data
                if (data.enzyme_data) {
                    // Populate substrate data
                    if (data.enzyme_data.substrate) {
                        for (const enzyme of enzymes) {
                            if (data.enzyme_data.substrate[enzyme]) {
                                const substrateCheckbox = document.getElementById(`${prefix}-${enzyme}-substrate`);
                                if (substrateCheckbox) {
                                    substrateCheckbox.checked = true;
                                    toggleInputs(prefix, enzyme, 'substrate');
                                }
                            }
                        }
                    }
                    
                    // Populate inhibition data
                    if (data.enzyme_data.inhibition) {
                        for (const enzyme of enzymes) {
                            if (data.enzyme_data.inhibition[enzyme]) {
                                const inhibitorCheckbox = document.getElementById(`${prefix}-${enzyme}-inhibitor`);
                                if (inhibitorCheckbox) {
                                    inhibitorCheckbox.checked = true;
                                    toggleInputs(prefix, enzyme, 'inhibitor');
                                    
                                    // Set inhibition type
                                    const inhibitionType = data.enzyme_data.inhibition[enzyme].inhibition_type;
                                    if (inhibitionType) {
                                        const typeSelect = document.getElementById(`${prefix}-${enzyme}-inhibition-type`);
                                        if (typeSelect) {
                                            typeSelect.value = inhibitionType;
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                
                // Show sources
                const substrateCount = data.enzyme_data.substrate ? Object.keys(data.enzyme_data.substrate).length : 0;
                const inhibitionCount = data.enzyme_data.inhibition ? Object.keys(data.enzyme_data.inhibition).length : 0;
                
                resultsDiv.innerHTML = `
                    <div class="results">
                        <h3>Data Fetched Successfully</h3>
                        <p><strong>Sources:</strong> ${data.sources.join(', ')}</p>
                        <p><strong>SMILES:</strong> ${data.smiles || 'Not found'}</p>
                        <p><strong>Molecular Weight:</strong> ${data.molecular_weight || 'Not found'} g/mol</p>
                        <p><strong>Substrate Enzymes:</strong> ${substrateCount}</p>
                        <p><strong>Inhibition Enzymes:</strong> ${inhibitionCount}</p>
                    </div>
                `;
                
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error fetching data: ${error.message}</div>`;
            }
        }
        
        function displayDDIResults(result) {
            const resultsDiv = document.getElementById('ddi-results');
            
            const riskClass = `risk-${result.risk_category}`;
            
            let html = `
                <div class="results">
                    <h2>DDI Risk Assessment: ${result.drug_a} + ${result.drug_b}</h2>
                    <div class="result-item">
                        <h3>Risk Category</h3>
                        <span class="risk-badge ${riskClass}">${result.risk_category.toUpperCase()}</span>
                        <span class="confidence-badge confidence-${result.confidence}">Confidence: ${result.confidence}</span>
                        <p style="margin-top: 10px;">Risk Score: ${result.risk_score.toFixed(1)}/100</p>
                    </div>
                    
                    <div class="result-item">
                        <h3>Mechanism</h3>
                        <p>${result.mechanism.charAt(0).toUpperCase() + result.mechanism.slice(1)}</p>
                        <p style="margin-top: 5px;">Affected Enzymes: ${result.affected_enzymes.join(', ') || 'None'}</p>
                    </div>
                    
                    <div class="result-item">
                        <h3>Clinical Implications</h3>
                        <ul class="list-group">
            `;
            
            result.clinical_implications.forEach(imp => {
                html += `<li>${imp}</li>`;
            });
            
            html += `
                        </ul>
                    </div>
                    
                    <div class="result-item">
                        <h3>Recommended Actions</h3>
                        <ul class="list-group">
            `;
            
            result.recommended_actions.forEach(action => {
                html += `<li>${action}</li>`;
            });
            
            html += `
                        </ul>
                    </div>
                </div>
            `;
            
            resultsDiv.innerHTML = html;
        }
        
        // Initialize enzyme cards on page load
        document.addEventListener('DOMContentLoaded', function() {
            const ddiDrugAEnzymes = document.getElementById('ddi-drug-a-enzymes');
            const ddiDrugBEnzymes = document.getElementById('ddi-drug-b-enzymes');
            
            enzymes.forEach(enzyme => {
                ddiDrugAEnzymes.innerHTML += createEnzymeCard(enzyme, 'ddi-drug-a');
                ddiDrugBEnzymes.innerHTML += createEnzymeCard(enzyme, 'ddi-drug-b');
            });
        });
        
        function createEnzymeCard(enzyme, prefix) {
            return `
                <div class="enzyme-card">
                    <h3>${enzyme}</h3>
                    <div class="checkbox-group">
                        <input type="checkbox" id="${prefix}-${enzyme}-substrate" onchange="toggleInputs('${prefix}', '${enzyme}', 'substrate')">
                        <label for="${prefix}-${enzyme}-substrate">Substrate</label>
                    </div>
                    <div class="form-group" id="${prefix}-${enzyme}-substrate-inputs" style="display: none;">
                        <label>Fraction Metabolized (fm)</label>
                        <input type="number" step="0.01" min="0" max="1" id="${prefix}-${enzyme}-fm" placeholder="0.0 - 1.0">
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="${prefix}-${enzyme}-inhibitor" onchange="toggleInputs('${prefix}', '${enzyme}', 'inhibitor')">
                        <label for="${prefix}-${enzyme}-inhibitor">Inhibitor</label>
                    </div>
                    <div class="form-group" id="${prefix}-${enzyme}-inhibitor-inputs" style="display: none;">
                        <label>Inhibition Type</label>
                        <select id="${prefix}-${enzyme}-inhibition-type">
                            <option value="weak">Weak</option>
                            <option value="moderate">Moderate</option>
                            <option value="strong">Strong</option>
                        </select>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="${prefix}-${enzyme}-inducer" onchange="toggleInputs('${prefix}', '${enzyme}', 'inducer')">
                        <label for="${prefix}-${enzyme}-inducer">Inducer</label>
                    </div>
                    <div class="form-group" id="${prefix}-${enzyme}-inducer-inputs" style="display: none;">
                        <label>Induction Type</label>
                        <select id="${prefix}-${enzyme}-induction-type">
                            <option value="weak">Weak</option>
                            <option value="moderate">Moderate</option>
                            <option value="strong">Strong</option>
                        </select>
                    </div>
                </div>
            `;
        }
        
        function toggleInputs(prefix, enzyme, type) {
            const checkbox = document.getElementById(`${prefix}-${enzyme}-${type}`);
            const inputsDiv = document.getElementById(`${prefix}-${enzyme}-${type}-inputs`);
            inputsDiv.style.display = checkbox.checked ? 'block' : 'none';
        }
    </script>
</body>
</html>
